environment = "development"
debug = true
version = "1.0.0"

[server]
host = "0.0.0.0"
port = 3000

[server.tls]
enabled = false

[frontend]
url = "http://localhost:5173"

[database]
host = "postgres"
port = 5432
user = "fuse"
password = "fuse_dev_password"
name = "fuse"
sslmode = "disable"
migrate = true

[redis]
host = "redis"
port = 6379
username = ""
password = ""
db = 0

[cors]
enabled = true
allowed_origins = ["http://localhost:5173"]
allowed_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
allowed_headers = ["Content-Type", "X-Requested-With", "Accept", "Authorization"]
exposed_headers = ["X-Total-Count"]
allow_credentials = true
max_age = 86400

[auth]
session_secret = "local-docker-session-secret-change-for-shared-envs"

[auth.google]
client_id = "local-docker-google-client-id"
client_secret = "local-docker-google-client-secret"

[session]
duration = 86400
name = "fuse_auth_session"

[session.cookie]
path = "/"
domain = ""
secure = false
http_only = true
same_site = "lax"

[mail]
from = "local@example.com"
password = "local-mail-password"
name = "Fuse Local"
